name: Status

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.farecraft.co/api/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "Unexpected: $STATUS" && exit 1; fi
